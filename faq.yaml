- category: "Programs & Learning"
  questions:
    - q: "What programs do you offer?"
      a: "We specialize in 1-on-1 sessions for <strong>Coding, Robotics, and AI</strong> from Kindergarten to Grade 12. Our project-based curriculum is designed to turn screen time into future-ready skills."
    - q: "Does my child need any prior coding experience?"
      a: "Not at all! We welcome students of all skill levels. Because our sessions are <strong>one-on-one</strong>, we meet your child exactly where they are, whether they are total beginners or ready for advanced programming."
    - q: "Which programming languages do you teach?"
      a: "Students progress from visual block-coding to professional, industry-standard languages including <strong>Python, JavaScript, and Java</strong>. We also cover AI concepts and hands-on robotics engineering."
    - q: "My child has ADHD or is still learning to read—is this a fit?"
      a: "Absolutely! Because our sessions are <strong>strictly 1-on-1</strong>, we customize the pace for every child. Our hands-on robotics projects are excellent for keeping active minds engaged and focused."

- category: "Location & Schedule"
  questions:
    - q: "Where are classes held and what are the hours?"
      a: "Visit us in person at <strong>CO-OP Dalhousie, NW Calgary</strong>, or join us online. We are open <strong>7 days a week, from 9:00 AM to 7:00 PM</strong>, to fit your family's busy schedule."
    - q: "How do I book sessions?"
      a: "Everything is managed through our <strong>Parent Portal</strong>. You can book sessions, view progress reports, and download achievement certificates with one click."
    - q: "What happens if we need to reschedule a session?"
      a: "We value flexibility! You can easily manage your bookings through the Parent Portal. Since sessions are one-on-one, we can work with you to find a makeup time that fits your schedule."

- category: "Pricing & Trials"
  questions:
    - q: "How much does it cost?"
      a: "Our monthly plans are simple: <strong>$99/month for In-Person</strong> or <strong>$79/month for Online</strong>. This includes 1-on-1 coaching, all hardware use in-lab, and 24/7 access to our online learning platform."
    - q: "Do you offer discounts for siblings?"
      a: "Yes! We offer an incredible <strong>50% discount</strong> for siblings or friends who attend the same session together."
    - q: "Can we try a free demo?"
      a: "Yes! We encourage all parents to book a <strong>Free Trial Session</strong> through our portal so your child can experience the lab firsthand before you commit."

- category: "Curriculum & Tech"
  questions:
    - q: "Can my child practice their coding at home?"
      a: "Yes! Your enrollment includes <strong>24/7 access</strong> to our award-winning online platform. Students are encouraged to continue working on their projects and exploring new challenges between their 1-on-1 sessions."
    - q: "What equipment is needed for online classes?"
      a: "For online sessions, your child just needs a computer (laptop or desktop) with a reliable internet connection and a webcam. All the software and curriculum are provided through our cloud-based platform."
    - q: "How does coding help with my child's school performance?"
      a: "Coding strengthens <strong>logical thinking, math skills, and problem-solving abilities</strong>. It also builds confidence and resilience as students learn to 'debug' challenges—skills that directly benefit their academic performance in science and mathematics."
